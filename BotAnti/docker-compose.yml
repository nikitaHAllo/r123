services:
  userbot:
    build: .
    image: botanti:latest
    container_name: botanti-userbot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/database.db
    volumes:
      - botanti_data:/data
    command: ["node", "dist/index.js"]

  bot:
    image: botanti:latest
    container_name: botanti-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/database.db
    volumes:
      - botanti_data:/data
    command: ["node", "dist/bot.js"]
    depends_on:
      - userbot

volumes:
  botanti_data:
